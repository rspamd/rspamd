options = {
	filters = ["regexp"]
	url_tld = "{= env.TESTDIR =}/../lua/unit/test_tld.dat"
	pidfile = "{= env.TMPDIR =}/rspamd.pid"
}
logging = {
	type = "file",
	level = "info"
	filename = "{= env.TMPDIR =}/rspamd.log"
}
metric = {
	name = "default",
	actions = {
		reject = 15,
	}
}

worker {
	type = normal
	bind_socket = "{= env.LOCAL_ADDR =}:{= env.PORT_NORMAL =}"
	count = 1
	keypair {
		pubkey = "{= env.KEY_PUB1 =}";
		privkey = "{= env.KEY_PVT1 =}";
	}
	task_timeout = 60s;
}
worker {
	type = controller
	bind_socket = "{= env.LOCAL_ADDR =}:{= env.PORT_CONTROLLER =}"
	count = 1
	keypair {
		pubkey = "{= env.KEY_PUB1 =}";
		privkey = "{= env.KEY_PVT1 =}";
	}
	secure_ip = ["127.0.0.1", "::1"];
}

classifier "bayes" {
	backend = "redis";
	statfile {
		symbol = BAYES_SPAM;
		spam = true;
	}
	statfile {
		symbol = BAYES_HAM;
		spam = false;
	}
	autolearn {
		spam_threshold = 10.0;
		ham_threshold = -10.0;
		junk_threshold = 5.0;
		require_queue_id = false;
		check_local = false;
		check_authed = false;
	}
}
lua = "{= env.TESTDIR =}/lua/autolearnstats_test.lua";
lua = "{= env.TESTDIR =}/lua/test_coverage.lua";
