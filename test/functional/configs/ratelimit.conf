.include(duplicate=append,priority=0) "{= env.TESTDIR =}/configs/plugins.conf"

redis {
  servers = "{= env.REDIS_ADDR =}:{= env.REDIS_PORT =}";
}

ratelimit {
  rates {
    bounce_to_ip {
      bucket {
        burst = 4;
        rate = "1 / 1s";
      }
    }
    to_selector_xxx {
      selector = "id('special');to.in('special@example.net')";
      bucket {
        burst = 2;
        rate = "1 / 1s";
      }
    }
    to_multi_buckets {
      # Two buckets in one rule: the restrictive one (burst = 2) must apply,
      # not just the last one in the array (burst = 20). Regression for #6059.
      selector = "id('multi');to.in('multi@example.net')";
      bucket = [
        {
          burst = 2;
          rate = "1 / 1s";
        },
        {
          burst = 20;
          rate = "1 / 1s";
        }
      ];
    }
  }
}
