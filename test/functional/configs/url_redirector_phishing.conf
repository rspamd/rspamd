.include(duplicate=append,priority=0) "{= env.TESTDIR =}/configs/plugins.conf"

redis {
  servers = "{= env.REDIS_ADDR =}:{= env.REDIS_PORT =}";
}

url_redirector {
  redirector_hosts_map = "{= env.TESTDIR =}/configs/maps/redir.map";
  redirector_symbol = "URL_REDIRECTOR";
}

phishing {
  symbol = "PHISHING";
}

# Resolve the redirector host (t.co, listed in redir.map) to the dummy HTTP
# server so the redirect is actually followed during the test.
options {
  dns {
    fake_records = [{
      name = "t.co";
      type = "a";
      replies = ["127.0.0.1"];
    }];
  }
}
