name: Code Review

on:
  issue_comment:
    types: [created]

concurrency:
  group: code-review-${{ github.event.issue.number }}
  cancel-in-progress: true

permissions:
  pull-requests: write
  contents: read
  issues: write

jobs:
  code-review:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    # Only run on PR comments that contain "@review" from authorized users.
    # The comment may optionally name a z.ai GLM model: "@review",
    # "@review glm-4.7", "@review glm-5" or "@review z-ai/glm-5.1"
    # (provider prefix is stripped). Default: glm-5.1.
    if: |
      github.repository == 'rspamd/rspamd' &&
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '@review') &&
      (
        github.event.comment.user.login == 'vstakhov' ||
        github.event.comment.user.login == 'moisseev' ||
        github.event.comment.user.login == 'fatalbanana'
      )

    steps:
      - name: Acknowledge review start with reaction
        run: |
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            /repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions \
            -f content='eyes'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Parse requested model
        id: parse
        env:
          # Passed via env (never interpolated into the script) to avoid
          # shell injection from arbitrary comment text.
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          set -euo pipefail
          # First whitespace-delimited token after "@review" (case-insensitive),
          # normalised to lowercase. A provider prefix such as "z-ai/" is
          # stripped, so a bare id ("glm-5.1") and an OpenRouter-style id
          # ("z-ai/glm-5.1") both resolve to the z.ai model id.
          # z.ai GLM models: glm-5.1 (flagship), glm-5-turbo (fast), glm-5,
          # glm-4.7, glm-4.6.
          MODEL=$(printf '%s' "$COMMENT_BODY" \
            | grep -ioE '@review[[:space:]]+[A-Za-z0-9._/-]+' \
            | head -n1 \
            | awk '{print $2}' \
            | tr '[:upper:]' '[:lower:]' || true)
          MODEL="${MODEL##*/}"
          if [ -z "$MODEL" ]; then
            MODEL="glm-5.1"
          fi
          echo "Requested review model: $MODEL"
          echo "model=$MODEL" >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout PR branch
        run: gh pr checkout ${{ github.event.issue.number }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code CLI
        run: |
          npm install -g @anthropic-ai/claude-code
          claude --version

      - name: Configure git identity
        run: |
          git config user.name "Code Reviewer"
          git config user.email "noreply@rspamd.com"

      - name: Perform automated code review
        env:
          # Claude Code talks to z.ai's Anthropic-compatible endpoint.
          ANTHROPIC_BASE_URL: https://api.z.ai/api/anthropic
          ANTHROPIC_AUTH_TOKEN: ${{ secrets.ZAI_API_KEY }}
          # Pin every model slot to a real z.ai GLM model so no "claude-*"
          # alias can ever reach the endpoint. The reviewer runs on the
          # requested model; background/fast tasks use glm-5-turbo.
          ANTHROPIC_MODEL: ${{ steps.parse.outputs.model }}
          ANTHROPIC_DEFAULT_OPUS_MODEL: ${{ steps.parse.outputs.model }}
          ANTHROPIC_DEFAULT_SONNET_MODEL: ${{ steps.parse.outputs.model }}
          ANTHROPIC_DEFAULT_HAIKU_MODEL: glm-5-turbo
          ANTHROPIC_SMALL_FAST_MODEL: glm-5-turbo
          DISABLE_AUTOUPDATER: "1"
          DISABLE_TELEMETRY: "1"
          DISABLE_ERROR_REPORTING: "1"
          DISABLE_BUG_COMMAND: "1"
          CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: "1"
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          cat > prompt.txt << 'EOF'
          You are a conservative automated code reviewer for the Rspamd mail filtering project.
          Your goal is high-precision, low-noise feedback: report only defects you are certain about.

          You are running as the model "${{ steps.parse.outputs.model }}" served by z.ai.

          ## Step 1 — Gather full context before writing any comment

          You are reviewing pull request #${{ github.event.issue.number }} of
          ${{ github.repository }}. The PR branch is already checked out in the
          current working directory.

          Use the GitHub CLI (gh) to gather context. Run, at minimum:
          - gh pr view ${{ github.event.issue.number }} --json title,body,author,headRefName,baseRefName
          - gh pr diff ${{ github.event.issue.number }}
          - gh api repos/${{ github.repository }}/pulls/${{ github.event.issue.number }}/comments
            (inline review comments)
          - gh api repos/${{ github.repository }}/pulls/${{ github.event.issue.number }}/reviews
            (review summaries)
          - gh api repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/comments
            (issue-level comments)

          Read carefully:
          - PR title, description, and the author's stated intent
          - The complete unified diff with diff-position line numbers
          - All existing review threads, including every reply
          - Any maintainer explanations (vstakhov, moisseev, fatalbanana)

          You may also read files in the working tree for additional context.

          Do NOT write any comment until you have read all existing threads.

          ## Step 2 — Duplicate and dismissed-feedback filter (mandatory)

          Before drafting a comment, check:
          1. Has this exact issue already been raised in an existing thread?
          2. Has a maintainer replied to that thread with an explanation, marked it resolved,
             or indicated the behaviour is intentional or by design?

          If either condition is true, SKIP the issue entirely. Do not re-raise dismissed or
          accepted concerns under any circumstances, even if you still think there is a problem.

          ## Step 3 — Defect qualification (only report findings that pass all criteria)

          Only report a finding if ALL of the following are true:
          - It is a concrete, demonstrable defect in the changed lines, or a pre-existing bug
            that the new code newly exposes or makes reachable
          - You can explain exactly why it is wrong (not merely unusual or unfamiliar)
          - It has a clear, identifiable impact: crash, data loss, memory leak, security
            vulnerability, silent incorrect behaviour, or definite API misuse
          - A specific, actionable fix exists

          Reject any finding that is:
          - A style, formatting, or naming preference (clang-format / luacheck own this)
          - A subjective architectural opinion
          - Speculative ("this might cause…" or "could potentially…")
          - About test coverage, documentation, or minor performance
          - Based on an assumption that has not been verified in the diff

          ## Step 4 — Rspamd-specific rules to check (only on changed lines)

          ### Memory management
          - C code must use rspamd_mempool or g_malloc/g_free — never raw malloc/free
          - Every allocation must have a matching free; check error-path cleanup
          - Verify no use-after-free when mempools are destroyed

          ### C++ containers
          - Never use std::unordered_map or std::unordered_set — use ankerl::unordered_dense

          ### Logging format strings
          - rspamd uses its own printf implementation (see src/libutil/printf.h for the
            full list of format specifiers) — it is NOT standard printf
          - Lua rspamd_logger uses %s for every argument type
          - Format strings must never come from untrusted input

          ### Lua stack discipline
          - Every lua_push* must be balanced; check stack cleanup on all exit paths
          - Validate lua_check_* return values before dereferencing

          ### Security (high-confidence only)
          - Buffer overflows with verifiable out-of-bounds access
          - Integer overflows in size/offset arithmetic feeding an allocation or copy
          - NULL pointer dereferences on unchecked return values
          - Confirmed command/SQL injection in external calls

          ### Error handling
          - Unchecked return values from functions that can fail, where the failure is silently ignored

          ## Step 5 — Comment format (strict)

          Each comment MUST contain exactly three parts:
          1. **Defect**: one sentence describing what is wrong and where
          2. **Impact**: one sentence stating the concrete consequence (crash / leak / wrong result / …)
          3. **Fix**: a specific code-level suggestion

          No emojis. No hedging language ("might", "could", "consider"). Plain technical prose.

          ## Step 6 — Positioning rules

          - Inline comments MUST target a line that is part of the changed diff (added or context lines within the diff hunk).
          - If you cannot identify the exact changed line with certainty, do NOT post an inline comment.
            Post a single top-level summary comment for that finding instead.
          - When in doubt about positioning, always prefer a summary comment over a mispositioned inline comment.

          ## Step 7 — Submission

          Use the GitHub CLI to submit. The PR number is ${{ github.event.issue.number }} and
          repository is ${{ github.repository }}.

          Commands:
          - Summary / approval only:
            gh pr review ${{ github.event.issue.number }} --comment --body "..."
          - Request changes with summary (no inline):
            gh pr review ${{ github.event.issue.number }} --request-changes --body "..."
          - Approve:
            gh pr review ${{ github.event.issue.number }} --approve --body "No actionable defects found."

          End the review body with the line:
          _Automated review by Claude Code (${{ steps.parse.outputs.model }} via z.ai)._

          Limits:
          - Post at most 5 comments in total; choose the highest-severity findings.
          - If all findings are low-severity (no crash, leak, or security issue) and you have
            fewer than 2, post only an approval comment.
          - A single finding that involves a crash, memory leak, or security vulnerability is
            always worth reporting — do not suppress it.
          - Never post test or exploratory API calls — every comment is immediately visible.
          EOF

          echo "Running code review with model: ${{ steps.parse.outputs.model }}"
          claude -p "$(cat prompt.txt)" \
            --model "${{ steps.parse.outputs.model }}" \
            --dangerously-skip-permissions \
            --max-turns 60 \
            2>&1 | tee review-output.log

      - name: Post failure notice
        if: ${{ failure() }}
        run: |
          gh pr comment ${{ github.event.issue.number }} --body "⚠️ Automated code review failed to complete. Check the [workflow run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Dismiss previous change requests if approved
        if: ${{ success() }}
        run: |
          # Get all reviews for this PR
          REVIEWS=$(gh api "/repos/${{ github.repository }}/pulls/${{ github.event.issue.number }}/reviews" --jq '.[] | select(.state == "CHANGES_REQUESTED" and .user.login == "github-actions[bot]") | .id')

          # Dismiss each change request review
          for REVIEW_ID in $REVIEWS; do
            echo "Dismissing review $REVIEW_ID"
            gh api \
              --method PUT \
              -H "Accept: application/vnd.github+json" \
              "/repos/${{ github.repository }}/pulls/${{ github.event.issue.number }}/reviews/$REVIEW_ID/dismissals" \
              -f message="Dismissed after new approval" || echo "Failed to dismiss review $REVIEW_ID (may already be dismissed)"
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload debug artifacts on failure
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: code-review-debug-${{ github.run_id }}
          path: |
            prompt.txt
            review-output.log
          if-no-files-found: ignore
          retention-days: 7
