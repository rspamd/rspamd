name: ci

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - '**'

# A commit pushed to a branch that also has an open PR fires two runs at
# once: one for `push` (ref refs/heads/<branch>) and one for `pull_request`
# (ref refs/pull/<n>/merge). They duplicate each other's work and, sharing
# the hosted runners, double CPU load -- which is enough to push the heavy
# 001_merged rspamd's controller startup past the functional suites' fixed
# readiness timeouts and flake (e.g. 440_ssl_server). The only identifier
# the two events share is the head commit SHA (their refs differ), so key
# the concurrency group on it: both events for one commit collapse to a
# single run, and cancel-in-progress reaps the loser instead of racing it.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.head.sha || github.sha }}
  cancel-in-progress: true

jobs:
  linters:
    uses: ./.github/workflows/ci_linters.yml

  fedora:
    uses: ./.github/workflows/ci_rspamd.yml
    with:
      image: ghcr.io/rspamd/rspamd-build-docker:fedora-ci
      name: fedora-ci
      enable_luajit: 'OFF'

  ubuntu_amd64:
    uses: ./.github/workflows/ci_rspamd.yml
    with:
      image: ghcr.io/rspamd/rspamd-build-docker:ubuntu-ci
      name: ubuntu-ci-amd64

  ubuntu_arm64:
    if: ${{ !vars.NO_ARM }}
    uses: ./.github/workflows/ci_rspamd.yml
    with:
      image: ghcr.io/rspamd/rspamd-build-docker:ubuntu-ci
      name: ubuntu-ci-arm64
      runner: ${{ vars.ARM_RUNNER || 'ubuntu-24.04-arm' }}

  ubuntu-focal:
    uses: ./.github/workflows/ci_rspamd_build.yml
    with:
      image: ghcr.io/rspamd/rspamd-build-docker:ubuntu-focal
      name: ubuntu-focal

  centos-8:
    uses: ./.github/workflows/ci_rspamd_build.yml
    with:
      image: ghcr.io/rspamd/rspamd-build-docker:centos-8
      name: centos-8

  centos-9:
    uses: ./.github/workflows/ci_rspamd_build.yml
    with:
      image: ghcr.io/rspamd/rspamd-build-docker:centos-9
      name: centos-9

  webui-e2e-playwright:
    needs: ubuntu_amd64
    uses: ./.github/workflows/ci_webui_e2e_playwright.yml
    with:
      image: ghcr.io/rspamd/rspamd-build-docker:ubuntu-ci
      name: ubuntu-ci-amd64
